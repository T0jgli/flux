apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: default
spec:
  instances: 1
  env:
    - name: TZ
      value: Europe/Budapest
  replicationSlots:
    highAvailability:
      enabled: true

  storage:
    size: 10Gi
    storageClass: local-path
  managed:
    roles:
      - name: admin
        ensure: present
        passwordSecret:
          name: admin-user
        comment: admin
        login: true
        superuser: true
      - name: keycloak
        ensure: present
        passwordSecret:
          name: keycloak-user
        comment: keycloak user
        login: true
        connectionLimit: -1
        inherit: true
      - name: n8n
        ensure: present
        passwordSecret:
          name: n8n-user
        comment: n8n user
        login: true
        connectionLimit: -1
        inherit: true
  postgresql:
    shared_preload_libraries: ["passwordcheck"]
    parameters:
      pgaudit.log_catalog: "off"
      pgaudit.log_parameter: "off"
      pgaudit.log_relation: "off"
      pgaudit.log_statement: "off"

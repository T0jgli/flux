---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloaksecret
  namespace: keycloak
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: keycloaksecret
  dataFrom:
    - extract:
        key: keycloak-keycloaksecret

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-user
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: postgresql-user
    template:
      type: kubernetes.io/basic-auth
  dataFrom:
    - extract:
        key: postgresql-n8n-user

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: musicbot-env
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: musicbot-env
  data:
    - secretKey: TOKEN
      remoteRef:
        key: musicbot-musicbot-env

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustfs
  namespace: rustfs
spec:
  interval: 10m
  targetNamespace: rustfs
  releaseName: rustfs
  chart:
    spec:
      chart: rustfs
      version: "0.0.99"
      sourceRef:
        kind: HelmRepository
        name: rustfs
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: rustfs-values

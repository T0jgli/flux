---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rustfs-user
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: rustfs-user
  data:
    - secretKey: RUSTFS_ACCESS_KEY
      remoteRef:
        key: rustfs-rustfs-user-access-key
    - secretKey: RUSTFS_SECRET_KEY
      remoteRef:
        key: rustfs-rustfs-user-secret-key

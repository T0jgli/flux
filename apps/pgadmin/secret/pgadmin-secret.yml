---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pgadmin-secret
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: pgadmin-secret
  data:
    - secretKey: pgadmin-default-password
      remoteRef:
        key: pgadmin-pgadmin-secret
